services:
  openwebui:
    container_name: openwebui
    hostname: openwebui
    build:
      context: .
      dockerfile: ${OPENWEBUI_DIR}/Dockerfile
    ports:
      - "${OPENWEBUI_IP_WEB}:${OPENWEBUI_PORT_WEB}:8080"
      - "${OPENWEBUI_IP_SSH}:${OPENWEBUI_PORT_SSH}:22"
    volumes:
      - ${OPENWEBUI_DIR}/data:/app/backend/data
      - ${OPENWEBUI_DIR}/scripts/entrypoint.bash:/entrypoint.bash:ro
      - ${COMMON_DIR}/ssh/sshd_config:/etc/ssh/sshd_config:ro
      - ${COMMON_DIR}/ssh/authorized_keys:/tmp/authorized_keys:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file: ${OPENWEBUI_DIR}/.env
    environment:
      - EXTRA_PIP_PACKAGES=datasets==3.6.0
      # Override the image's default of /ollama (which expects a /ollama
      # proxy path on the openwebui server). Use the direct internal URL
      # so openwebui talks to ollama via the docker network.
    entrypoint: ["/entrypoint.bash"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    networks:
      - ailab-web
      - ailab-local

  kokoro:
    container_name: kokoro
    hostname: kokoro
    build:
      context: .
      dockerfile: ${KOKORO_DIR}/Dockerfile
    ports:
      - "127.0.0.1:${KOKORO_PORT}:${KOKORO_PORT}"
    env_file: ${KOKORO_DIR}/.env
    volumes:
      - ${KOKORO_DIR}/scripts/entrypoint.sh:/entrypoint.sh:ro
    restart: unless-stopped
    networks:
      - ailab-web

  swag:
    container_name: swag
    hostname: swag
    build:
      context: .
      dockerfile: ${SWAG_DIR}/Dockerfile
    ports:
      - "${SWAG_IP}:${SWAG_PORT_HTTP}:80"
      - "${SWAG_IP}:${SWAG_PORT_HTTPS}:443"
    env_file: ${SWAG_DIR}/.env
    volumes:
      - ${SWAG_DIR}/data/certs:/config/keys
      - ${SWAG_DIR}/nginx/default.conf:/config/nginx/site-confs/default.conf
      - ${SWAG_DIR}/scripts/entrypoint.sh:/custom-entrypoint.sh:ro
    depends_on:
      - openwebui
    restart: unless-stopped
    networks:
      - ailab-web

networks:
  ailab-web:
    driver: bridge
  ailab-local:
    external: true
    name: ailab-localai_ailab-local
